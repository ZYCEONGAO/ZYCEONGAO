name: Global Tech Stack Metrics
on:
  schedule: [{cron: "0 18 * * *"}] # 每天凌晨自动跑
  workflow_dispatch:              # 支持手动点击运行
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Deep Architecture Metrics
        uses: lowlighter/metrics@latest
        with:
          # 调用刚刚更新的经典 Token Secret
          token: ${{ secrets.METRICS_TOKEN }}
          
          # 输出配置
          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update advanced github metrics assets [skip ci]"
          
          # 基础设置
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          
          # 仓库范围过滤
          repositories_batch: 100
          repositories_affiliations: owner
          repositories_forks: false       # 只统计自主开发的高质量底层代码库，排除别人的 fork
          
          # 【核心：深度解构全栈语言资产】
          plugin_languages: yes
          plugin_languages_indepth: yes    # 开启高阶分析，深入扫描依赖文件（如 go.mod, Cargo.toml 等）
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 10
          plugin_languages_ignored: html, css, tex  # 过滤干扰语言，重点展现工程核心逻辑
          
          # 【附加：开发习惯高阶看板】
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
